# ==========================================
# PROJECT: OBSIDIAN CODEX
# ARCHITECTURE: MULTI-LAYERED VAULT
# ==========================================

title: OBSIDIAN CODEX
description: The multi-layered archive of the African Exodus and world epochs.
url: "https://saphahcentral.github.io"
baseurl: "/vault"

# ------------------------------------------
# CRITICAL: UNHIDE THE BUNKER
# This allows the browser to fetch files from the _data directory.
# ------------------------------------------
include:
  - "_data"

# ------------------------------------------
# RENDERING ENGINE
# ------------------------------------------
markdown: kramdown
highlighter: rouge

# ------------------------------------------
# PERMALINKS
# ------------------------------------------
permalink: /:path/:basename/

# ------------------------------------------
# EXCLUSIONS (Standard)
# ------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# =====================================================
# OBSIDIAN CODEX: ACCESS AUTHORIZATION MAP
# =====================================================
# These levels define the security "lore" and UI logic
# for the multi-layered vault structure.

vault_access:
  main:
    level: "OC0"
    status: "PUBLIC ARCHIVE"
    crawling: "PERMITTED"
    security_clearance: "UNRESTRICTED"
  vault1:
    level: "OC1"
    status: "RESTRICTED ACCESS"
    crawling: "SHIELDED"
    security_clearance: "BASIC VALIDATION REQUIRED"
  vault2:
    level: "OC2"
    status: "HIGH SECURITY"
    crawling: "SANITIZED"
    security_clearance: "ADVANCED AUTHENTICATION REQUIRED"
  vault3:
    level: "OC3"
    status: "DEEP CORE / CLASSIFIED"
    crawling: "TOTAL BLACKOUT"
    security_clearance: "COMMANDER LEVEL ONLY"
  data_bunker:
    level: "DATA"
    status: "SERVICE ACCESS ONLY"
    crawling: "FORBIDDEN"
    security_clearance: "ENCRYPTED"
    
